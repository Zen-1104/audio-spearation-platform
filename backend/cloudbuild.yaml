steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--no-cache',
      '-t', 'asia-south1-docker.pkg.dev/project-127cfc75-bc57-400d-a9d/cloud-run-source-deploy/audio-spearation-platform:$COMMIT_SHA',
      '-f', 'backend/Dockerfile',
      'backend'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/project-127cfc75-bc57-400d-a9d/cloud-run-source-deploy/audio-spearation-platform:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args: [
      'run', 'services', 'update', 'audio-spearation-platform',
      '--image', 'asia-south1-docker.pkg.dev/project-127cfc75-bc57-400d-a9d/cloud-run-source-deploy/audio-spearation-platform:$COMMIT_SHA',
      '--region', 'asia-south1'
    ]

images:
  - 'asia-south1-docker.pkg.dev/project-127cfc75-bc57-400d-a9d/cloud-run-source-deploy/audio-spearation-platform:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'